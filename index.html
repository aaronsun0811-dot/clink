<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>clink</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="app">
      <aside id="skills" class="skills hidden">
        <div class="skills-head">
          <span data-i18n="skills">技能</span>
          <span class="grow"></span>
          <button id="skills-import" data-i18n="import">＋ 导入</button>
          <button id="skills-refresh" data-i18n-title="refresh" title="刷新">⟳</button>
        </div>
        <div class="skills-tabs">
          <button data-tool="all" class="active" data-i18n="all">全部</button>
          <button data-tool="claude">Claude</button>
          <button data-tool="codex">Codex</button>
          <button data-tool="grok">Grok</button>
        </div>
        <input id="skills-filter" data-i18n-ph="filterSkills" placeholder="筛选 name / 描述…" />
        <div id="skills-list"></div>
      </aside>

      <div class="workspace">
        <div class="toolbar">
          <button id="toggle-skills" data-i18n="skills">技能</button>
          <button id="toggle-history" data-i18n="history">历史</button>
          <button id="add-pane" data-i18n="addColumn">＋面板</button>
          <button id="new-path" data-i18n="newBtn">新建</button>
          <button id="open-folder" data-i18n="openFolder">打开</button>
          <select id="lang-select" title="Language"></select>
          <span class="grow"></span>
          <span class="hint" data-i18n="hint">点工具栏 / 技能会作用于「高亮」面板</span>
        </div>
        <div id="panes" class="panes"></div>
      </div>
    </div>

    <div id="newfile-modal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-title" data-i18n="newFileTitle">新建文件 / 文件夹</div>
        <input id="newfile-path" class="modal-input" placeholder="~/projA/notes.md" />
        <div class="modal-msg" id="newfile-msg"></div>
        <div class="modal-btns">
          <button id="newfile-cancel" data-i18n="cancel">取消</button>
          <button id="newfile-dir" data-i18n="makeDir">建文件夹</button>
          <button id="newfile-file" class="primary" data-i18n="makeFile">建文件</button>
        </div>
      </div>
    </div>

    <div id="import-modal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-title" data-i18n="importTitle">导入技能(复制文件夹)</div>
        <div class="import-tool">
          <span data-i18n="importTo">导入到：</span>
          <label><input type="radio" name="imp-tool" value="claude" checked /> Claude</label>
          <label><input type="radio" name="imp-tool" value="codex" /> Codex</label>
          <label><input type="radio" name="imp-tool" value="grok" /> Grok</label>
        </div>
        <div class="import-row">
          <input id="import-src" class="modal-input" data-i18n-ph="importSrcPh" placeholder="技能文件夹路径，如 ~/Downloads/my-skill" />
          <button id="import-pick" type="button" data-i18n="chooseFolder">选择文件夹</button>
        </div>
        <div class="modal-msg" id="import-msg" data-i18n="importNeedSkill">文件夹里需包含 SKILL.md</div>
        <div class="modal-btns">
          <button id="import-cancel" data-i18n="cancel">取消</button>
          <button id="import-go" class="primary" data-i18n="importBtn">导入</button>
        </div>
      </div>
    </div>

    <div id="history-modal" class="modal hidden">
      <div class="modal-box history-box">
        <div class="modal-title" data-i18n="historyTitle">历史会话（点一下续接）</div>
        <div class="skills-tabs" id="history-tabs">
          <button data-tool="all" class="active" data-i18n="all">全部</button>
          <button data-tool="claude">Claude</button>
          <button data-tool="codex">Codex</button>
          <button data-tool="grok">Grok</button>
        </div>
        <input id="history-filter" class="modal-input" data-i18n-ph="historyFilterPh" placeholder="筛选标题 / 目录…" />
        <div id="history-list" class="history-list"></div>
        <div class="modal-btns">
          <button id="history-close" data-i18n="close">关闭</button>
        </div>
      </div>
    </div>
  </body>
</html>
